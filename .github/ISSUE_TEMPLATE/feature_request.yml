name: Feature Request
description: Propose a new feature or enhancement to QuADMESH
title: "feat: "
labels: ["type: feat", "priority: normal", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for new functionality or enhancements. For bugs, use the Bug Report template.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Sketch the API and/or implementation approach.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: downstream-impact
    attributes:
      label: Downstream impact
      description: Does this change affect a known downstream consumer?
      options:
        - "none"
        - "MADMESHing"
        - "ADMESH"
        - "ADMESH-Domains"
        - "multiple"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "now"
        - "normal"
        - "someday"
      default: 1
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related issues, PRs, or design docs
      placeholder: "e.g. #12, specs/001-..."
